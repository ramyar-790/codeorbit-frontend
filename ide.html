<!doctype html>
<html>
  <head>
    <title>CodeOrbit IDE</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <style>
      .search-box {
        display: flex;
        gap: 5px;
        margin-bottom: 10px;
      }

      .search-box input {
        flex: 1;
      }

      .search-box button {
        padding: 6px 10px;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <!-- ================= SIDEBAR ================= -->
      <div class="sidebar">
        <h3 id="userLabel">MY FILES</h3>

        <div class="search-box">
          <input id="searchBox" placeholder="Search files..." />
          <button onclick="searchFiles()">Search</button>
        </div>

        <div id="noResult">No files found</div>
        <div id="fileList"></div>

        <div class="btns">
          <button onclick="newFile()">+ File</button>
          <button onclick="newFolder()">+ Folder</button>
          <button onclick="logout()">Logout</button>
        </div>
      </div>

      <!-- ================= MAIN ================= -->
      <div class="main">
        <div class="topbar">
          <div class="left">
            <span class="logo">CodeOrbit</span>
            <span id="filename">editor.html</span>
          </div>

          <div class="right">
            <button onclick="run()">Run</button>
            <button onclick="save()">Save</button>
            <button onclick="downloadFile()">Download</button>
            <button onclick="clearOut()">Clear</button>
          </div>
        </div>

        <textarea id="editor" placeholder="Write your code..."></textarea>

        <div class="terminal">
          <pre id="output">Ready...</pre>
        </div>
      </div>
    </div>

    <!-- ================= SCRIPT ================= -->
    <script src="app.js"></script>

    <script>
      // 🔐 PROTECT IDE (NO DIRECT ACCESS)
      window.onload = () => {
        const token = localStorage.getItem("token");

        if (!token || token === "null") {
          window.location.href = "auth.html";
        } else {
          document.getElementById("userLabel").innerText = "My Workspace 🚀";
        }
      };

      // 🚪 LOGOUT (GO BACK TO LOGIN)
      function logout() {
        localStorage.removeItem("token");
        window.location.href = "auth.html";
      }
    </script>
  </body>
</html>
