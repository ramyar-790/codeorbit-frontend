<!doctype html>
<html>
  <head>
    <title>CodeOrbit IDE</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="layout">
      <!-- ================= SIDEBAR ================= -->
      <div class="sidebar">
        <h3 id="userLabel">MY FILES</h3>

        <input
          id="searchBox"
          placeholder="Search files..."
          oninput="searchAll(this.value)"
        />

        <div id="noResult">No files found</div>

        <div id="fileList"></div>

        <div class="btns">
          <button onclick="newFile()">+ File</button>
          <button onclick="newFolder()">+ Folder</button>
          <button onclick="logout()">Logout</button>
        </div>
      </div>

      <!-- ================= MAIN ================= -->
      <div class="main">
        <!-- TOP BAR -->
        <div class="topbar">
          <div class="left">
            <span class="logo">CodeOrbit</span>
            <span id="filename">loading...</span>
          </div>

          <div class="right">
            <button onclick="run()">Run</button>
            <button onclick="save()">Save</button>
            <button onclick="downloadFile()">Download</button>
            <button onclick="clearOut()">Clear</button>
          </div>
        </div>

        <!-- EDITOR -->
        <textarea id="editor" placeholder="Write your code..."></textarea>

        <!-- OUTPUT -->
        <div class="terminal">
          <pre id="output">Ready...</pre>
        </div>
      </div>
    </div>

    <script src="app.js"></script>

    <!-- ================= AUTH GUARD ================= -->
    <script>
      (function () {
        const token = localStorage.getItem("token");

        if (!token || token === "null") {
          window.location.href = "auth.html";
        }
      })();

      // 👇 OPTIONAL: show your name/email in sidebar
      document.addEventListener("DOMContentLoaded", () => {
        const token = localStorage.getItem("token");
        if (token) {
          document.getElementById("userLabel").innerText = "My Workspace";
        }
      });
    </script>
  </body>
</html>
