<!doctype html>
<html>
  <head>
    <title>CodeOrbit</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="center">
    <div class="card hover-card fade-in">
      <h1>⚡ CodeOrbit</h1>
      <p class="tagline">Your Cloud Code Editor</p>

      <button onclick="go()">Get Started</button>
    </div>

    <script>
      // 👉 Navigate to login page
      function go() {
        document.body.style.opacity = "0.6";

        setTimeout(() => {
          window.location.href = "auth.html";
        }, 200);
      }

      // 👉 Reset session on homepage
      window.onload = () => {
        localStorage.removeItem("token");
      };
    </script>
  </body>
</html>
