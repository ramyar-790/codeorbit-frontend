<!doctype html>
<html>
  <head>
    <title>CodeOrbit - Welcome</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <style>
      .tagline {
        font-size: 14px;
        color: #8b949e;
        margin-bottom: 20px;
      }

      button {
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        border: none;
        background: #7dd3fc;
        color: #0d1117;
        font-weight: 600;
        transition: 0.2s;
      }

      button:hover {
        background: #38bdf8;
        transform: scale(1.05);
      }
    </style>
  </head>

  <body class="center">
    <div class="card hover-card fade-in">
      <h1>⚡ CodeOrbit</h1>
      <p class="tagline">WELCOME TO YOUR CLOUD CODE EDITOR 🚀</p>

      <button onclick="goLogin()">Get Started</button>
    </div>

    <script>
      // 🔥 ALWAYS START HERE (CLEAR OLD SESSION)
      localStorage.removeItem("token");

      // 🚀 GO TO LOGIN PAGE
      function goLogin() {
        document.body.style.opacity = "0.6";

        setTimeout(() => {
          window.location.href = "auth.html";
        }, 200);
      }

      // 🔐 SAFETY CHECK (if already logged in → go editor)
      window.onload = () => {
        const token = localStorage.getItem("token");

        if (token && token !== "null") {
          window.location.href = "ide.html";
        }
      };
    </script>
  </body>
</html>
